<!DOCTYPE html>
<html>

<head>
    <title>LeadGen Engine — Indic POC</title>
    <style>
        body {
            font-family: sans-serif;
            text-align: center;
            padding: 50px;
            background: #0f1117;
            color: #e0e0e0;
        }

        .card {
            background: #1a1d27;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            display: inline-block;
            min-width: 360px;
        }

        h1 {
            margin-bottom: 6px;
            font-size: 24px;
        }

        .subtitle {
            color: #888;
            font-size: 13px;
            margin-bottom: 28px;
        }

        label {
            display: block;
            text-align: left;
            font-size: 12px;
            color: #888;
            margin-bottom: 6px;
        }

        select {
            width: 100%;
            padding: 10px 14px;
            font-size: 14px;
            border-radius: 8px;
            border: 1px solid #333;
            background: #0f1117;
            color: #e0e0e0;
            margin-bottom: 20px;
            cursor: pointer;
            appearance: none;
        }

        button {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 8px;
            border: none;
            background: #4f6ef7;
            color: white;
            font-weight: 600;
            transition: opacity 0.2s;
        }

        button:hover {
            opacity: 0.85;
        }

        button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        #status {
            margin-top: 18px;
            font-size: 13px;
            color: #888;
        }

        #status.connected {
            color: #4ade80;
        }

        #status.error {
            color: #f87171;
        }

        .lang-badge {
            display: inline-block;
            margin-top: 10px;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            background: #2a2d3a;
            color: #a78bfa;
        }

        .meter-container {
            margin-top: 20px;
            text-align: left;
        }

        .meter-label {
            font-size: 10px;
            color: #666;
            margin-bottom: 4px;
            display: flex;
            justify-content: space-between;
        }

        .meter-bar {
            width: 100%;
            height: 4px;
            background: #222;
            border-radius: 2px;
            overflow: hidden;
        }

        .meter-fill {
            height: 100%;
            width: 0%;
            background: #4ade80;
            transition: width 0.1s;
        }

        #testAudioBtn {
            margin-top: 15px;
            background: #2a2d3a;
            font-size: 12px;
            padding: 8px;
        }

        .transcript-container {
            margin-top: 24px;
            background: #000;
            padding: 15px;
            border-radius: 8px;
            min-height: 80px;
            max-height: 150px;
            overflow-y: auto;
            text-align: left;
            border: 1px solid #333;
        }

        .transcript-label {
            font-size: 10px;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        #transcriptText {
            font-size: 14px;
            line-height: 1.5;
            color: #fff;
        }

        .interim {
            color: #888;
            font-style: italic;
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>🎙️ LeadGen Engine</h1>
        <p class="subtitle">Indic Language Voice AI · POC</p>

        <label for="langSelect">Select Conversation Language</label>
        <select id="langSelect">
            <option value="en">🇺🇸 English — Jessica (ElevenLabs)</option>
            <option value="hi">🇮🇳 Hindi — Bulbul v2 (Sarvam AI)</option>
            <option value="mr">🇮🇳 Marathi — Bulbul v2 (Sarvam AI)</option>
        </select>

        <button id="startBtn">Start Conversation</button>
        <button id="testAudioBtn">🔊 Test System Audio</button>

        <div class="meter-container">
            <div class="meter-label">Assistant Output <span id="volVal">0%</span></div>
            <div class="meter-bar"><div id="volFill" class="meter-fill"></div></div>
        </div>

        <div class="transcript-container">
            <div class="transcript-label">Live Transcript</div>
            <div id="transcriptText">Waiting for voice...</div>
        </div>

        <p id="status">Status: Idle</p>
        <span class="lang-badge" id="langBadge">English · Deepgram STT</span>
    </div>

    <script>
        const btn = document.getElementById('startBtn');
        const status = document.getElementById('status');
        const langSelect = document.getElementById('langSelect');
        const langBadge = document.getElementById('langBadge');

        const badgeMap = {
            en: 'English · Deepgram STT + ElevenLabs TTS',
            hi: 'Hindi · Sarvam Shuka STT + Bulbul v2 TTS',
            mr: 'Marathi · Sarvam Shuka STT + Bulbul v2 TTS',
        };

        langSelect.onchange = () => {
            langBadge.textContent = badgeMap[langSelect.value];
        };

        btn.onclick = async () => {
            const lang = langSelect.value;
            btn.disabled = true;
            langSelect.disabled = true;
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            console.log(`[Audio] Context sample rate: ${audioCtx.sampleRate}Hz`);
            if (audioCtx.state === 'suspended') await audioCtx.resume();

            const analyser = audioCtx.createAnalyser();
            analyser.fftSize = 256;
            analyser.connect(audioCtx.destination);
            const volFill = document.getElementById('volFill');
            const volVal = document.getElementById('volVal');
            const transcriptText = document.getElementById('transcriptText');

            const updateMeter = () => {
                const data = new Uint8Array(analyser.frequencyBinCount);
                analyser.getByteFrequencyData(data);
                let sum = 0;
                for (let i = 0; i < data.length; i++) sum += data[i];
                const avg = sum / data.length;
                const level = Math.min(100, Math.round((avg / 128) * 100));
                volFill.style.width = level + '%';
                volVal.textContent = level + '%';
                requestAnimationFrame(updateMeter);
            };
            updateMeter();

            // Pass language as query param so server knows before any audio arrives
            const ws = new WebSocket(`ws://${window.location.host}/ws?locale=${lang}`);
            ws.binaryType = 'arraybuffer';

            let nextAudioTime = 0;
            let activeSources = [];
            let isSpeaking = false;
            let graceTimer = null;
            let audioChunks = [];

            ws.onopen = () => {
                status.textContent = `Connected · Speaking ${langSelect.options[langSelect.selectedIndex].text.split('—')[0].trim()}`;
                status.className = 'connected';
            };

            ws.onmessage = async (e) => {
                if (typeof e.data === 'string') {
                    const msg = JSON.parse(e.data);
                    if (msg.type === 'session_ready') {
                        console.log('🚀 Session ready, enabling mic');
                        startMic(ws);
                    }
                    if (msg.type === 'server_error') {
                        console.error('❌ Server Error:', msg.message);
                        status.textContent = `Error: ${msg.message}`;
                        status.className = 'error';
                    }
                    if (msg.type === 'user_transcript') {
                        const text = msg.text || '';
                        const isFinal = msg.final;
                        // Use a dedicated 'active-transcript' element for live feedback
                        let activeLine = document.getElementById('active-line');
                        if (!activeLine) {
                            activeLine = document.createElement('div');
                            activeLine.id = 'active-line';
                            transcriptText.appendChild(activeLine);
                        }
                        activeLine.innerHTML = isFinal ? `<strong>You:</strong> ${text}` : `<span class="interim">You: ${text}...</span>`;
                        if (isFinal) {
                            activeLine.id = ''; // Finalize this line
                        }
                        transcriptText.scrollTop = transcriptText.scrollHeight;
                    }
                    if (msg.type === 'assistant_text') {
                        const div = document.createElement('div');
                        div.innerHTML = `<strong>Jessica:</strong> ${msg.text}`;
                        transcriptText.appendChild(div);
                        transcriptText.scrollTop = transcriptText.scrollHeight;
                    }
                    if (msg.type === 'assistant_audio_start') {
                        status.textContent = 'Jessica is speaking...';
                        isSpeaking = true;
                        if (graceTimer) clearTimeout(graceTimer);
                        activeSources.forEach(src => {
                            try { src.stop(); } catch(e){}
                        });
                        activeSources = [];
                        audioChunks = [];
                        nextAudioTime = audioCtx.currentTime;
                    }
                    if (msg.type === 'assistant_audio_stop') {
                        status.textContent = `Connected · Speaking ${langSelect.options[langSelect.selectedIndex].text.split('—')[0].trim()}`;
                        
                        if (audioChunks.length > 0) {
                            const totalLen = audioChunks.reduce((acc, val) => acc + val.length, 0);
                            const combined = new Uint8Array(totalLen);
                            let offset = 0;
                            for (const chunk of audioChunks) {
                                combined.set(chunk, offset);
                                offset += chunk.length;
                            }
                            
                            try {
                                const audioBuffer = await audioCtx.decodeAudioData(combined.buffer);
                                const src = audioCtx.createBufferSource();
                                src.buffer = audioBuffer;
                                src.connect(analyser);
                                if (nextAudioTime < audioCtx.currentTime + 0.05) {
                                    nextAudioTime = audioCtx.currentTime + 0.05;
                                }
                                src.start(nextAudioTime);
                                nextAudioTime += audioBuffer.duration;
                                
                                activeSources.push(src);
                                src.onended = () => {
                                    const idx = activeSources.indexOf(src);
                                    if (idx > -1) activeSources.splice(idx, 1);
                                };
                            } catch (e) {
                                console.warn('Decode error', e);
                            }
                        }

                        graceTimer = setTimeout(() => {
                            isSpeaking = false;
                        }, 800);
                    }
                    if (msg.type === 'assistant_audio_chunk') {
                        const binaryStr = atob(msg.audio_b64);
                        const len = binaryStr.length;
                        const bytes = new Uint8Array(len);
                        for (let i = 0; i < len; i++) {
                            bytes[i] = binaryStr.charCodeAt(i);
                        }
                        audioChunks.push(bytes);
                    }
                    return;
                }
            };

            ws.onerror = () => {
                status.textContent = 'Connection error';
                status.className = 'error';
                btn.disabled = false;
                langSelect.disabled = false;
            };

            ws.onclose = () => {
                status.textContent = 'Disconnected';
                status.className = 'error';
                btn.disabled = false;
                langSelect.disabled = false;
            };

            const startMic = async (socket) => {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const micCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
                console.log(`[Audio] Mic context sample rate: ${micCtx.sampleRate}Hz`);
                const source = micCtx.createMediaStreamSource(stream);
                // Use 4096 buffer size for ~85ms stable chunks
                const processor = micCtx.createScriptProcessor(4096, 1, 1);
                source.connect(processor);
                processor.connect(micCtx.destination);

                processor.onaudioprocess = (e) => {
                    if (socket.readyState !== WebSocket.OPEN) return;
                    if (isSpeaking) return;
                    const input = e.inputBuffer.getChannelData(0);
                    const output = new Int16Array(input.length);
                    for (let i = 0; i < input.length; i++) {
                        output[i] = Math.max(-1, Math.min(1, input[i])) * 0x7FFF;
                    }
                    socket.send(output.buffer);
                };
            };
        };

        document.getElementById('testAudioBtn').onclick = async () => {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);
            gain.gain.setValueAtTime(0.1, ctx.currentTime);
            osc.start();
            osc.stop(ctx.currentTime + 1);
            console.log('Test beep played');
        };
    </script>
</body>

</html>
