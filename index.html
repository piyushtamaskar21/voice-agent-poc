<!DOCTYPE html>
<html>

<head>
    <title>LeadGen Engine — Indic POC</title>
    <style>
        body {
            font-family: sans-serif;
            text-align: center;
            padding: 50px;
            background: #0f1117;
            color: #e0e0e0;
        }

        .card {
            background: #1a1d27;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            display: inline-block;
            min-width: 360px;
        }

        h1 {
            margin-bottom: 6px;
            font-size: 24px;
        }

        .subtitle {
            color: #888;
            font-size: 13px;
            margin-bottom: 28px;
        }

        label {
            display: block;
            text-align: left;
            font-size: 12px;
            color: #888;
            margin-bottom: 6px;
        }

        select {
            width: 100%;
            padding: 10px 14px;
            font-size: 14px;
            border-radius: 8px;
            border: 1px solid #333;
            background: #0f1117;
            color: #e0e0e0;
            margin-bottom: 20px;
            cursor: pointer;
            appearance: none;
        }

        button {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 8px;
            border: none;
            background: #4f6ef7;
            color: white;
            font-weight: 600;
            transition: opacity 0.2s;
        }

        button:hover {
            opacity: 0.85;
        }

        button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        #status {
            margin-top: 18px;
            font-size: 13px;
            color: #888;
        }

        #status.connected {
            color: #4ade80;
        }

        #status.error {
            color: #f87171;
        }

        .lang-badge {
            display: inline-block;
            margin-top: 10px;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            background: #2a2d3a;
            color: #a78bfa;
        }

        .meter-container {
            margin-top: 20px;
            text-align: left;
        }

        .meter-label {
            font-size: 10px;
            color: #666;
            margin-bottom: 4px;
            display: flex;
            justify-content: space-between;
        }

        .meter-bar {
            width: 100%;
            height: 4px;
            background: #222;
            border-radius: 2px;
            overflow: hidden;
        }

        .meter-fill {
            height: 100%;
            width: 0%;
            background: #4ade80;
            transition: width 0.1s;
        }

        #testAudioBtn {
            margin-top: 15px;
            background: #2a2d3a;
            font-size: 12px;
            padding: 8px;
        }

        .transcript-container {
            margin-top: 24px;
            background: #000;
            padding: 15px;
            border-radius: 8px;
            min-height: 80px;
            max-height: 150px;
            overflow-y: auto;
            text-align: left;
            border: 1px solid #333;
        }

        .transcript-label {
            font-size: 10px;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        #transcriptText {
            font-size: 14px;
            line-height: 1.5;
            color: #fff;
        }

        .interim {
            color: #888;
            font-style: italic;
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>🎙️ LeadGen Engine</h1>
        <p class="subtitle">Indic Language Voice AI · POC</p>
        <label for="langSelect">Select Conversation Language</label>
        <select id="langSelect">
            <option value="en">🇺🇸 English — Jessica (ElevenLabs)</option>
            <option value="hi">🇮🇳 Hindi — Bulbul v2 (Sarvam AI)</option>
            <option value="mr">🇮🇳 Marathi — Bulbul v2 (Sarvam AI)</option>
        </select>
        <button id="startBtn">Start Conversation</button>
        <button id="testAudioBtn">🔊 Test System Audio</button>
        <div class="meter-container">
            <div class="meter-label">Assistant Output <span id="volVal">0%</span></div>
            <div class="meter-bar">
                <div id="volFill" class="meter-fill"></div>
            </div>
        </div>
        <div class="transcript-container">
            <div class="transcript-label">Live Transcript</div>
            <div id="transcriptText">Waiting for voice...</div>
        </div>
        <p id="status">Status: Idle</p>
        <span class="lang-badge" id="langBadge">English · Deepgram STT</span>
    </div>

    <script>
        const btn = document.getElementById('startBtn');
        const status = document.getElementById('status');
        const langSelect = document.getElementById('langSelect');
        const langBadge = document.getElementById('langBadge');

        const badgeMap = {
            en: 'English · Deepgram STT + ElevenLabs TTS',
            hi: 'Hindi · Sarvam STT + Bulbul v2 TTS',
            mr: 'Marathi · Sarvam STT + Bulbul v2 TTS',
        };
        langSelect.onchange = () => { langBadge.textContent = badgeMap[langSelect.value]; };

        btn.onclick = async () => {
            const lang = langSelect.value;
            btn.disabled = true;
            langSelect.disabled = true;

            // PLAYBACK context — default rate (44100/48000 Hz) for ElevenLabs MP3 + Sarvam WAV
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            console.log(`[Playback] ${audioCtx.sampleRate}Hz`);
            if (audioCtx.state === 'suspended') await audioCtx.resume();

            const analyser = audioCtx.createAnalyser();
            analyser.fftSize = 256;
            analyser.connect(audioCtx.destination);

            const volFill = document.getElementById('volFill');
            const volVal = document.getElementById('volVal');
            const transcriptText = document.getElementById('transcriptText');

            const updateMeter = () => {
                const data = new Uint8Array(analyser.frequencyBinCount);
                analyser.getByteFrequencyData(data);
                let sum = 0;
                for (let i = 0; i < data.length; i++) sum += data[i];
                const level = Math.min(100, Math.round((sum / data.length / 128) * 100));
                volFill.style.width = level + '%';
                volVal.textContent = level + '%';
                requestAnimationFrame(updateMeter);
            };
            updateMeter();

            const ws = new WebSocket(`ws://${window.location.host}/ws?locale=${lang}`);
            ws.binaryType = 'arraybuffer';

            let isSpeaking = false;
            let graceTimer = null;
            let audioChunkBuffers = [];  // accumulate raw bytes per turn

            async function playBufferedAudio() {
                if (audioChunkBuffers.length === 0) {
                    console.warn('[Audio] No chunks to play');
                    return;
                }
                // Merge all chunk ArrayBuffers into one
                const totalBytes = audioChunkBuffers.reduce((s, b) => s + b.byteLength, 0);
                const merged = new Uint8Array(totalBytes);
                let offset = 0;
                for (const buf of audioChunkBuffers) {
                    merged.set(new Uint8Array(buf), offset);
                    offset += buf.byteLength;
                }
                audioChunkBuffers = [];
                console.log(`[Audio] Decoding ${totalBytes} bytes`);

                try {
                    // slice(0) gives decodeAudioData a detached copy — required by spec
                    const decoded = await audioCtx.decodeAudioData(merged.buffer.slice(0));
                    const src = audioCtx.createBufferSource();
                    src.buffer = decoded;
                    src.connect(analyser);
                    src.start(audioCtx.currentTime + 0.05);
                    console.log(`[Audio] Playing ${decoded.duration.toFixed(2)}s`);
                } catch (err) {
                    console.error('[Audio] decodeAudioData error:', err);
                }
            }

            ws.onopen = () => {
                status.textContent = `Connected · ${langSelect.options[langSelect.selectedIndex].text.split('—')[0].trim()}`;
                status.className = 'connected';
            };

            ws.onmessage = async (e) => {
                if (typeof e.data !== 'string') return;
                const msg = JSON.parse(e.data);

                if (msg.type === 'session_ready') {
                    console.log('Session ready — starting mic');
                    startMic(ws);
                }

                if (msg.type === 'server_error') {
                    console.error('Server error:', msg.message);
                    status.textContent = `Error: ${msg.message}`;
                    status.className = 'error';
                }

                if (msg.type === 'user_transcript') {
                    const text = msg.text || '';
                    let line = document.getElementById('active-line');
                    if (!line) {
                        line = document.createElement('div');
                        line.id = 'active-line';
                        transcriptText.appendChild(line);
                    }
                    line.innerHTML = msg.final
                        ? `<strong>You:</strong> ${text}`
                        : `<span class="interim">You: ${text}...</span>`;
                    if (msg.final) line.id = '';
                    transcriptText.scrollTop = transcriptText.scrollHeight;
                }

                if (msg.type === 'assistant_text') {
                    const div = document.createElement('div');
                    div.innerHTML = `<strong>Jessica:</strong> ${msg.text}`;
                    transcriptText.appendChild(div);
                    transcriptText.scrollTop = transcriptText.scrollHeight;
                }

                if (msg.type === 'assistant_audio_start') {
                    console.log('[Audio] Start — clearing buffer');
                    isSpeaking = true;
                    if (graceTimer) clearTimeout(graceTimer);
                    audioChunkBuffers = [];
                    status.textContent = 'Jessica is speaking...';
                }

                if (msg.type === 'assistant_audio_chunk') {
                    if (!msg.audio_b64) return;
                    const binary = atob(msg.audio_b64);
                    const bytes = new Uint8Array(binary.length);
                    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
                    audioChunkBuffers.push(bytes.buffer);
                    console.log(`[Audio] Chunk ${audioChunkBuffers.length}: ${bytes.length} bytes`);
                }

                if (msg.type === 'assistant_audio_stop') {
                    console.log(`[Audio] Stop — playing ${audioChunkBuffers.length} buffered chunks`);
                    status.textContent = `Connected · ${langSelect.options[langSelect.selectedIndex].text.split('—')[0].trim()}`;
                    await playBufferedAudio();
                    graceTimer = setTimeout(() => { isSpeaking = false; }, 1500);
                }
            };

            ws.onerror = () => {
                status.textContent = 'Connection error';
                status.className = 'error';
                btn.disabled = false;
                langSelect.disabled = false;
            };

            ws.onclose = () => {
                status.textContent = 'Disconnected';
                status.className = 'error';
                btn.disabled = false;
                langSelect.disabled = false;
            };

            // MIC context — locked to 16000 Hz to match Deepgram/Sarvam STT expectation
            const startMic = async (socket) => {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    const micCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
                    console.log(`[Mic] ${micCtx.sampleRate}Hz`);
                    const source = micCtx.createMediaStreamSource(stream);
                    const processor = micCtx.createScriptProcessor(4096, 1, 1);
                    source.connect(processor);
                    processor.connect(micCtx.destination);
                    processor.onaudioprocess = (e) => {
                        if (socket.readyState !== WebSocket.OPEN || isSpeaking) return;
                        const input = e.inputBuffer.getChannelData(0);
                        const pcm = new Int16Array(input.length);
                        for (let i = 0; i < input.length; i++) {
                            pcm[i] = Math.max(-32768, Math.min(32767, Math.round(input[i] * 32767)));
                        }
                        socket.send(pcm.buffer);
                    };
                } catch (err) {
                    console.error('[Mic] Access denied:', err);
                    status.textContent = 'Mic access denied';
                    status.className = 'error';
                }
            };
        };

        document.getElementById('testAudioBtn').onclick = async () => {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);
            gain.gain.setValueAtTime(0.15, ctx.currentTime);
            osc.frequency.setValueAtTime(440, ctx.currentTime);
            osc.start();
            osc.stop(ctx.currentTime + 0.8);
        };
    </script>
</body>

</html>
